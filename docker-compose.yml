# Turnstile - Self-hosted download provider bridge
# Part of the Pageturner project: https://github.com/pageturner-app/turnstile
# Licensed under AGPL v3 - https://www.gnu.org/licenses/agpl-3.0.html

services:
  turnstile:
    image: ghcr.io/pageturnerapp/turnstile:latest
    ports:
      - "7878:7878"
    volumes:
      - ./.env:/app/.env
      # Change the left side to your host downloads folder.
      # Keep DOWNLOADS_PATH=/downloads in .env for Docker installs.
      - /home/user/downloads:/downloads
    restart: unless-stopped
