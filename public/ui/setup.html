<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <base href="%BASE_HREF%">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Turnstile Setup</title>
    <link rel="icon" type="image/png" href="ui/turnstile-logo.png">
    <link rel="stylesheet" href="ui/style.css?v=20260417-ui2">
  </head>
  <body data-page="setup">
    <main id="page-setup" class="page active">
      <div class="auth-shell">
        <section class="auth-card">
          <img src="ui/turnstile-logo.png" alt="Turnstile" class="auth-logo">
          <h1>Turnstile</h1>
          <p class="auth-desc">Set an admin password to finish setup.</p>
          <div class="auth-error" id="setup-error" role="alert">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span id="setup-error-text"></span>
          </div>
          <form id="setup-form" method="post" action="ui/setup" novalidate>
            <div class="form-group">
              <label for="setup-password">Password</label>
              <input type="password" id="setup-password" name="password" minlength="12" autocomplete="new-password" placeholder="12 characters minimum" required>
              <div class="pw-strength" aria-hidden="true"><div class="pw-strength-bar" id="password-strength-bar"></div></div>
            </div>
            <div class="form-group">
              <label for="setup-password-confirm">Confirm</label>
              <input type="password" id="setup-password-confirm" autocomplete="new-password" placeholder="Re-enter password" required>
            </div>
            <button class="btn-primary" type="submit">Save password</button>
          </form>
        </section>
        <div class="auth-footer">Part of the <a href="https://getpageturner.com">Pageturner</a> project <span class="dot">&middot;</span> AGPL v3</div>
      </div>
    </main>
    <div class="toast-container" id="toast-container"></div>
    <script src="ui/app.js?v=20260417-ui2"></script>
  </body>
</html>
